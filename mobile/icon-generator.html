<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>beta.rocks Icon</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #333;
    }
    .icon-canvas {
      width: 1024px;
      height: 1024px;
      background: #1e1714;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon-canvas svg {
      color: #f97316;
      width: 300px;
      height: 300px;
    }
  </style>
</head>
<body>
  <div class="icon-canvas">
    <i data-lucide="cloud-sun" stroke-width="1.5"></i>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
